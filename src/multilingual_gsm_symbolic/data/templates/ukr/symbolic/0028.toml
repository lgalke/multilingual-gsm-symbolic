question = "Лікарня має місткість 1000 ліжок, з яких 1/5 зайнята. Через спалах коронавірусу до лікарні щодня госпіталізують 50 пацієнтів. Обчисліть загальну кількість вільних ліжок у лікарні через два тижні."
answer = "Якщо 1/5 від загальної місткості ліжок зайнята, це означає, що 1/5 * 1000 = <<1000*1/5=200>>200 ліжок зайняті пацієнтами.\nЗагальна кількість ліжок у лікарні без нових госпіталізацій становить 1000 ліжок - 200 ліжок = <<1000-200=800>>800 ліжок.\nЯкщо щодня госпіталізують 50 осіб, то загальна кількість пацієнтів у лікарні через один тиждень становить 50 пацієнтів/день * 7 днів/тиждень = 350 пацієнтів.\nЧерез два тижні загальна кількість госпіталізованих до лікарні пацієнтів становить 350 пацієнтів/тиждень*2 тижні = <<350*2=700>>700 пацієнтів, кожен з яких займає одне ліжко.\nЯкщо до нових госпіталізацій у лікарні було 800 вільних ліжок, то загальна кількість зменшується до 800 ліжок - 700 ліжок = <<800-700=100>>100 вільних ліжок.\n#### 100\n"
