answer_annotated = "Якщо {frac} від загальної місткості {item_plural} зайнята, це означає, що {frac} * {total} = <<{total}*{frac}={int(total*frac)}>>{int(total*frac)} {item_plural} зайняті пацієнтами.\nЗагальна кількість {item_plural} у {facility_definite} без нових госпіталізацій становить {total} {item_plural} - {int(total*frac)} {item_plural} = <<{total}-{int(total*frac)}={total-int(total*frac)}>>{total-int(total*frac)} {item_plural}.\nЯкщо щодня госпіталізують {daily} осіб, то загальна кількість пацієнтів у {facility_definite} через один тиждень становить {daily} пацієнтів/день * 7 днів/тиждень = {daily*7} пацієнтів.\nЧерез {period_txt} тижні загальна кількість госпіталізованих до {facility_definite} пацієнтів становить {daily*7} пацієнтів/тиждень*{period_val} тижні = <<{daily*7}*{period_val}={daily*period_val*7}>>{daily*period_val*7} пацієнтів, кожен з яких займає одне {item}.\nЯкщо до нових госпіталізацій у {facility_definite} було {total-int(total*frac)} вільних {item_plural}, то загальна кількість зменшується до {total-int(total*frac)} {item_plural} - {daily*period_val*7} {item_plural} = <<{total-int(total*frac)}-{daily*period_val*7}={total - (total * frac + daily * period_val * 7)}>>{total - (total * frac + daily * period_val * 7)} вільних {item_plural}.\n#### {total - (total * frac + daily * period_val * 7)}\n"
