question = "Сара поїхала на узбережжя у відпустку. Її батьки дали їй 75 крон, щоб купити все, що вона захоче. У кіоску карамельки продавалися за акцією: \"Купи 500 грамів за 20 крон, отримай 500 грамів за 1/2 ціни.\" Вона взяла 1100 грамів. Вона також купила змішаний пакетик із мушлями, який коштував 17 крон, і 4 магніти, які коштували по 2 крони за штуку. Скільки грошей у Сари залишилося?"
answer = "Карамельки коштують 20 крон за 500 грамів, а 500 грамів можна отримати за 1/2 ціни. Отже, 1/2 від ціни 500 грамів становить 500/500*1/2*20 крон = 10 крон.\nРазом це коштує 10 крон + 20 крон = 30 крон.\nРешта 100 грамів не має знижки і коштує 4 крони, тож загальна ціна становить 20 крон + 10 крон + 4 крони = <<20 + 10 + 4 = 34>>34 крони\n4 магніти по 2 крони за штуку коштують 4*2 крон=<<4*2=8>>8 крон\nЯкщо додати всі її покупки, 34 крони + 17 крон + 8 крон = <<34+17+8=59>>59 крон\nУ неї було 75 крон, і вона витратила 59 крон, тож у неї залишилося 75 крон - 59 крон = <<75-59=16>>16 крон\n#### 16\n"
