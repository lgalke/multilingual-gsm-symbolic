question_annotated = "Сара поїхала на узбережжя у відпустку. Її батьки дали їй {total,75} крон, щоб купити все, що вона захоче. У кіоску карамельки продавалися за акцією: \"Купи {n1,500} грамів за {p1,20} крон, отримай {n2,500} грамів за {discount,1/2} ціни.\" Вона взяла {n12,1100} грамів. Вона також купила змішаний пакетик із мушлями, який коштував {p2,17} крон, і {n3,4} магніти, які коштували по {p3,2} крони за штуку. Скільки грошей у Сари залишилося?\n\n#init:\n- $total = range(30, 100, 15)\n- $n1 = range(200, 651, 150)\n- $n2 = range(200, 651, 150)\n- $n12 = range(650, 1301, 150)\n- $n3 = range(4, 15, 2)\n- $p1 = range(20, 55, 5)\n- $p2 = range(17, 40, 4)\n- $p3 = range(2, 35, 3)\n- $discount = sample(fractions)\n\n#conditions:\n- n2 <= n1\n- n12 - n1 - n2 > 0\n- is_int(n1 * p1 + n2 * (1-discount) * p1 + (n12 - n1 - n2) * p1 + p2 + n3 * p3)\n- p1 + n2/n1 * (1-discount) * p1 + (n12 - n1 - n2)/n1 * p1 + p2 + n3 * p3 < total\n\n#answer: total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)\n"
answer_annotated = "Карамельки коштують {p1} крон за {n1} грамів, а {n2} грамів можна отримати за {discount} ціни. Отже, {discount} від ціни {n2} грамів становить {n2}/{n1}*{discount}*{p1} крон = {(n2/n1)*discount*p1} крон.\nРазом це коштує {(n2/n1)*discount*p1} крон + {p1} крон = {(n1/n2)*discount*p1 + p1} крон.\nРешта {n12 - n1 - n2} грамів не має знижки і коштує {(n12 - n1 - n2)/n1*p1} крони, тож загальна ціна становить {p1} крон + {n2/n1*discount*p1} крон + {(n12 - n1 - n2)/n1*p1} крони = <<{p1} + {n2/n1*discount*p1} + {(n12 - n1 - n2)/n1*p1} = {p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}>>{p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1} крони\n{n3} магніти по {p3} крони за штуку коштують {n3}*{p3} крон=<<{n3}*{p3}={n3*p3}>>{n3*p3} крон\nЯкщо додати всі її покупки, {p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1} крони + {p2} крон + {n3*p3} крон = <<{p1+(n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}+{p2}+{n3*p3}={int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}>>{int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)} крон\nУ неї було {total} крон, і вона витратила {int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)} крон, тож у неї залишилося {total} крон - {int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} крон = <<{total}-{int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}={total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}>>{total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} крон\n#### {total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}\n"
