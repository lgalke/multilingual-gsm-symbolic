question = "Сара готує попкорн як перекус. Коли пательня з кукурудзяними зернами нагрівається, зерна починають лопатися швидше. 20 зерен лопаються протягом перших 30 секунд приготування, потім утричі більше протягом наступних 30 секунд. У наступні 30 секунд кількість зерен зростає до чотирикратної початкової швидкості лопання, але в останні 30 секунд швидкість лопання зменшується до половини швидкості попередніх 30 секунд. Після того як Сара зняла пательню з вогню, через залишкове тепло лопається чверть від кількості зерен, що лопнули за останні 30 секунд приготування. Скільки попкорну Сара має, щоб з’їсти?"
answer = "Протягом других 30 секунд приготування лопається 3*20=<<3*20=60>>60 зерен.\nПротягом третіх 30 секунд лопається 4*20=<<4*20=80>>80 зерен.\nПротягом останніх 30 секунд лопається 80/2=<<80/2=40>>40 зерен.\nПісля приготування через залишкове тепло лопається 40/4=<<40/4=10>>10 зерен.\nОтже, Сара має 20 + 60 + 80 + 40 + 10 = <<20+60+80+40+10=210>>210 шматочків попкорну, щоб з’їсти.\n#### 210\n"
