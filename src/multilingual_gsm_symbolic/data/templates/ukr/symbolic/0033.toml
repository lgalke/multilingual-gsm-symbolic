question = "Кароліна та Йоганна — сестри з Копенгагена, які люблять збирати автографи знаменитостей. Протягом літніх канікул сестри щодня після обіду збирають автографи. Через п’ять тижнів Кароліна та Йоганна порівнюють свої альбоми для автографів і підраховують кількість автографів, які зібрала кожна сестра. У Кароліни в альбомі для автографів 20 автографів, а у Йоганни — 44. У сестер залишилося ще три тижні літніх канікул, і вони вирішують, що до кінця літа хочуть разом зібрати 100 автографів. Скільки автографів сестрам потрібно зібрати, щоб досягти своєї мети?"
