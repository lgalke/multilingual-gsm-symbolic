question = "Крістіан продає медівники та яблучний пиріг для благодійної кампанії зі збору коштів. У суботу він продав 10 коробок медівників і на 4 коробки яблучного пирога менше, ніж у неділю. У неділю він продав на 5 коробок медівників більше, ніж у суботу, і 15 коробок яблучного пирога. Якщо медівники коштують 6 крон, а яблучні пироги коштують 15 крон, скільки заробив Крістіан за два дні?"
answer = "У неділю він продав 10 + 5 = <<10+5=15>>15 коробок медівників.\nЗагальна кількість коробок медівників, які продав Крістіан, становить 10 + 15 = <<10+15=25>>25.\nКрістіан заробив 25*6 крон = <<25*6=150>>150 крон, продаючи медівники.\nУ суботу він продав 15 - 4 = <<15-4=11>>11 коробок яблучного пирога.\nЗагальна кількість коробок яблучного пирога, які продав Крістіан, становить 15 + 11 = <<15+11=26>>26.\nВін заробив 26*15 крон = <<26*15=390>>390 крон, продаючи яблучний пиріг.\nОтже, Крістіан заробив 150 крон + 390 крон = <<150+390=540>>540 крон за два дні.\n#### 540\n"
