question_annotated = "{name, Крістіан} продає {food,медівники} та {fruit,яблуко}вий пиріг для благодійної кампанії зі збору коштів. У {d1,суботу} він продав {n1,10} коробок {food,медівники} і на {m1,4} коробки {fruit,яблуко}вого пирога менше, ніж у {d2,неділю}. У {d2,неділю} він продав на {n2,5} коробок {food,медівники} більше, ніж у {d1,суботу}, і {m2,15} коробок {fruit,яблуко}вого пирога. Якщо {food,медівники} коштують {cn,6} {cur,крон}, а {fruit,яблуко}ві пироги коштують {cm,15} {cur,крон}, скільки заробив {name,Крістіан} за два дні?\n\n#init:\n- name = sample(names_male)\n- fruit, fruit_plural = sample(fruits)\n- cur = sample(currencies_sym)\n- food = sample([ \"медівники\", \"брауні\", \"булочки з корицею\", \"данська випічка\",])\n- d1, d2 = sample_sequential(weekdays, 2)\n- $n1 = range(21, 30)\n- $n2 = range(11, 15)\n- $m1 = range(2, 20)\n- $m2 = range(15, 30)\n- $cn = range(7, 13)\n- $cm = range(20, 33)\n\n#conditions:\n- m1 < m2\n\n#answer: (2*n1+n2)*cn + (2*m2-m1)*cm\n"
answer_annotated = "У {d2} він продав {n1} + {n2} = <<{n1}+{n2}={n1+n2}>>{n1+n2} коробок {food}.\nЗагальна кількість коробок {food}, які продав {name}, становить {n1} + {n1+n2} = <<{n1}+{n1+n2}={2*n1+n2}>>{n1+n1+n2}.\n{name} заробив {n1+n1+n2}*{cn} {cur} = <<{n1+n1+n2}*{cn}={(n1+n1+n2)*cn}>>{(n1+n1+n2)*cn} {cur}, продаючи медівники.\nУ {d1} він продав {m2} - {m1} = <<{m2}-{m1}={m2-m1}>>{m2-m1} коробок {fruit}вого пирога.\nЗагальна кількість коробок {fruit}вого пирога, які продав {name}, становить {m2} + {m2-m1} = <<{m2}+{m2-m1}={2*m2-m1}>>{2*m2-m1}.\nВін заробив {2*m2-m1}*{cm} {cur} = <<{2*m2-m1}*{cm}={(2*m2-m1)*cm}>>{(2*m2-m1)*cm} {cur}, продаючи {fruit}вий пиріг.\nОтже, {name} заробив {(n1+n1+n2)*cn} {cur} + {(2*m2-m1)*cm} {cur} = <<{(n1+n1+n2)*cn}+{(2*m2-m1)*cm}={(2*n1+n2)*cn + (2*m2-m1)*cm}>>{(2*n1+n2)*cn + (2*m2-m1)*cm} {cur} за два дні.\n#### {(2*n1+n2)*cn + (2*m2-m1)*cm}\n"
