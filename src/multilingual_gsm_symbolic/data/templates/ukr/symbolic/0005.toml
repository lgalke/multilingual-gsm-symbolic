question_annotated = "{name,Лісбет} готує {drink,каву} з цукром у відношенні {m,7}:{n,13}, де цукор вимірюється в чайних ложках, а вода — у децилітрах. Якщо загалом вона використала {x,120} чайних ложок цукру та децилітрів води, обчисліть кількість чайних ложок цукру, які вона використала.\n\n#init:\n- name = sample(names_female)\n- drink = sample(['каву', 'чаю'])\n- $m = range(7, 101, 3)\n- $n = range(4, 61, 3)\n- $x = range(5, 500, 5)\n\n#conditions: \n- divides(x, m+n)\n\n#answer: ((m*x)//(m+n))\n"
