question = "Серен дивиться телевізор після того, як закінчить домашнє завдання. У понеділок і вівторок він подивився по 1-годинному епізоду свого улюбленого шоу. У середу він подивився кілька епізодів 30-хвилинного шоу. У четвер він рано закінчив домашнє завдання і подивився 1-годинний епізод і 30-хвилинне шоу. У п’ятницю йому дозволили не лягати спати допізна, тож він подивився два 1-годинні епізоди. Якщо загалом він подивився 7 годин телевізора, скільки 30-хвилинних епізодів він подивився в середу?"
