question = "Дорте може бігти в чотири рази швидше, ніж вона може йти, але вона може стрибати зі швидкістю, що становить половину від тієї швидкості, з якою вона може бігти. Якщо вона може стрибати зі швидкістю 3 км на годину, скільки км вона може подолати за шість годин, якщо вона витрачає одну третину часу на біг і дві третини часу на ходьбу?"
answer = "Якщо Дорте може стрибати зі швидкістю, що становить половину від швидкості, з якою вона може бігти, то вона може бігти зі швидкістю 3*2=<<3*2=6>>6 км на годину.\nА оскільки вона може бігти зі швидкістю, що в чотири рази більша, ніж швидкість, з якою вона може йти, це означає, що вона може йти зі швидкістю 6/4=1,5 км на годину.\nЯкщо дві третини часу витрачаються на ходьбу, то вона йде 6*2/3=<<6*2/3=4>>4 години.\nЯкщо одна третина часу витрачається на біг, то вона біжить 6-4=<<6-4=2>>2 години.\nОтже, вона біжить 2 години зі швидкістю 6 км на годину, тобто 2*6=<<2*6=12>>12 км.\nВона йде 4 години зі швидкістю 1,5 км на годину, тобто 4*1,5=<<4*1,5=6>>6 км.\nОтже, загалом вона долає 12+6=<<12+6=18>>18 км.\n#### 18\n"
