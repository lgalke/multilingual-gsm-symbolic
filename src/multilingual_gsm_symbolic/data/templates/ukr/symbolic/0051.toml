question = "Альберт має квітковий прилавок на ринку. Він продає три види квітів: тюльпани, лілії та соняшники. Зазвичай він продає тюльпани по 18,1 крон за горщик, лілії по 12,3 крон за горщик, а соняшники по 14,9 крон за горщик. Сьогодні в Альберта немає дрібних монет, тож він вирішив округлювати до найближчої крони. Якщо він продасть 12 горщиків тюльпанів, 9 горщиків лілій і 17 горщиків соняшників, скільки він заробить?"
answer = "Альберт округлить ціну своїх тюльпанів вниз з 18,1 крон до 18 крон, оскільки цифра після 18 менша за 5.\nАльберт округлить ціну своїх соняшників вгору з 14,9 крон до 15 крон, оскільки цифра після 14 дорівнює 5 або більша.\nАльберт продає 12 горщиків тюльпанів*18 крон = <<12*18=216>>216 крон\nАльберт продає 9 горщиків лілій*12 крон = <<9*12=108>>108 крон\nАльберт продає 17 горщиків соняшників*15 крон = <<17*15=255>>255 крон\nУсього Альберт заробить 216 крон + 108 крон + 255 крон = <<216+108+255=579>>579 крон\n#### 579\n"
