question = "У Альберта есть цветочный прилавок на рынке. Он продаёт три вида цветов: тюльпаны, лилии и подсолнухи. Обычно он продаёт тюльпаны по 18,1 крон за горшок, лилии по 12,3 крон за горшок и подсолнухи по 14,9 крон за горшок. Сегодня у Альберта нет эре, поэтому он решил округлять до ближайшей кроны. Если он продаст 12 горшков с тюльпанами, 9 горшков с лилиями и 17 горшков с подсолнухами, сколько он заработает?"
